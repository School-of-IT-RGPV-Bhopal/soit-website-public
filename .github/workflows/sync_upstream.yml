name: Scheduled Upstream Sync for Main and Preview

on:
  schedule:
    # Runs at 12:30 PM IST (07:00 UTC) every Monday and Thursday
    - cron: '0 7 * * 1,4'
  
  workflow_dispatch:
    inputs:
      sync_dry_run:
        description: 'Dry Run Mode (true = skip push)'
        type: boolean
        default: false

jobs:
  sync_branches:
    name: Sync Main and Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Perform Upstream Synchronization
        uses: wei/git-sync@v3
        with:
          # Use the PAT for BOTH source and destination to ensure write permissions
          source_repo: "https://${{ secrets.UPSTREAM_PAT }}@github.com/School-of-IT-RGPV-Bhopal/website.git"
          source_branch: "main,preview"
          
          # We use the full URL here for clarity and to ensure the PAT handles the push
          destination_repo: "https://${{ secrets.UPSTREAM_PAT }}@github.com/Aradhya-Joshi/soit-rgpv-website.git"
          destination_branch: "main,preview"

          # Logic for pushing: Always push on schedule, or if dry_run is false during manual trigger
          push: ${{ github.event_name == 'schedule' || github.event.inputs.sync_dry_run != true }}